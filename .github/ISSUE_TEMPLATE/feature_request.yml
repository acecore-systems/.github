name: 改善・機能追加
description: 新機能、導線改善、UI/API 改善、運用改善などを提案します。
title: '[Feature] '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        共通項目は他の issue template と同じ順序です。実装の自由度を残す場合も、完了条件は具体的にしてください。

  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何をしたいかを 1-3 行で書いてください。
      placeholder: |
        例: 管理者が公開前に内容を確認できるプレビュー導線を追加する。
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 背景・目的
      description: なぜ必要か、誰に影響するかを書いてください。
      placeholder: |
        例: 公開前確認が属人的で、差し戻し時の確認漏れが起きやすい。
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 完了条件
      description: レビュー時に完了判断できるチェックリストを書いてください。
      placeholder: |
        - [ ] 対象ユーザーが新しい導線を利用できる
        - [ ] 既存の主要フローが壊れていない
        - [ ] 必要なドキュメントまたは設定が更新されている
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 対象範囲・除外範囲
      description: 今回触る範囲と、触らない範囲を分けて書いてください。
      placeholder: |
        対象:
        - 追加または変更する画面、API、ジョブ、設定

        除外:
        - 今回は扱わない将来拡張
    validations:
      required: true

  - type: textarea
    id: related
    attributes:
      label: 関連パス・URL
      description: 画面 URL、リポジトリ内パス、関連 issue/PR、外部サービスを書いてください。
      placeholder: |
        - URL:
        - パス:
        - 関連 issue/PR:

  - type: textarea
    id: verification
    attributes:
      label: 確認方法
      description: 実行すべきコマンド、画面確認、ログ確認、生成物確認を書いてください。
      placeholder: |
        - npm run build
        - pytest
        - 対象フローを画面または API で確認する
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 解きたい課題
      description: 現状のどこが不十分かを書いてください。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: 具体案があれば書いてください。実装方法を固定しない場合は、その旨を書いてください。

  - type: textarea
    id: impact
    attributes:
      label: UI・API・運用・データへの影響
      description: 表示、API、データ構造、外部サービス、運用手順などへの影響を書いてください。
      placeholder: |
        - UI:
        - API:
        - データ:
        - 運用:
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 補足
      description: 権限、期限、制約、依存関係などがあれば書いてください。
