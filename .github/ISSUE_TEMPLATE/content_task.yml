name: コンテンツ・ドキュメント修正
description: コンテンツ、翻訳、ドキュメントの変更を依頼します。
title: "[Content] "
labels: ["documentation"]
body:
  - type: textarea
    id: target
    attributes:
      label: 対象
      description: どのページ、言語、ドキュメント、リポジトリ領域が対象ですか？
      placeholder: |
        - URL:
        - パス:
        - ロケール:
    validations:
      required: true
  - type: textarea
    id: change
    attributes:
      label: 依頼内容
      description: 必要なコンテンツまたはドキュメント作業を書いてください。
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 理由
      description: なぜこの変更が必要ですか？
  - type: textarea
    id: links
    attributes:
      label: 関連リンク
      description: 参考資料、出典、関連Issue、Pull Requestなど。
