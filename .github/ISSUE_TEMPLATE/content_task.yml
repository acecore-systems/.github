name: コンテンツ・ドキュメント
description: コンテンツ、翻訳、ドキュメント、説明文、掲載情報の追加・更新を依頼します。
title: '[Content] '
labels: ['documentation']
body:
  - type: markdown
    attributes:
      value: |
        対象コンテンツ、出典、翻訳、公開日時、検索や内部リンクへの影響を分けて書いてください。

  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何を追加・変更したいかを 1-3 行で書いてください。
      placeholder: |
        例: 導入手順ドキュメントに Cloudflare 設定の注意点を追加する。
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 背景・目的
      description: なぜ必要か、誰に影響するかを書いてください。
      placeholder: |
        例: 初回設定時に権限不足で止まるケースが増えている。
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 完了条件
      description: レビュー時に完了判断できるチェックリストを書いてください。
      placeholder: |
        - [ ] 対象コンテンツが追加または更新されている
        - [ ] 必要な出典または関連リンクが明記されている
        - [ ] 翻訳対象または翻訳不要の判断が明記されている
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 対象範囲・除外範囲
      description: 今回触る範囲と、触らない範囲を分けて書いてください。
      placeholder: |
        対象:
        - 更新するページ、記事、ドキュメント

        除外:
        - 今回は扱わない関連文書
    validations:
      required: true

  - type: textarea
    id: related
    attributes:
      label: 関連パス・URL
      description: 画面 URL、リポジトリ内パス、関連 issue/PR、参考資料を書いてください。
      placeholder: |
        - URL:
        - パス:
        - 参考資料:

  - type: textarea
    id: verification
    attributes:
      label: 確認方法
      description: 実行すべきコマンド、画面確認、生成物確認、リンク確認を書いてください。
      placeholder: |
        - npm run build
        - npx prettier --check 対象ファイル
        - 対象ページまたは生成物を確認する
    validations:
      required: true

  - type: textarea
    id: target
    attributes:
      label: 対象コンテンツ
      description: どのページ、言語、ドキュメント、リポジトリ領域が対象かを書いてください。
      placeholder: |
        - URL:
        - パス:
        - ロケール:
    validations:
      required: true

  - type: textarea
    id: publication
    attributes:
      label: 公開日時・表示期間
      description: 公開日時、表示開始、表示終了、キャンペーン期間などがあれば書いてください。
      placeholder: |
        - 公開日時:
        - 表示開始:
        - 表示終了:

  - type: textarea
    id: source-links
    attributes:
      label: 出典・内部リンク・検索への影響
      description: 出典、関連リンク、タグ、検索、sitemap などへの影響を書いてください。
      placeholder: |
        - 出典:
        - 内部リンク:
        - タグ:
        - 検索/sitemap:

  - type: textarea
    id: notes
    attributes:
      label: 補足
      description: 権限、期限、制約、依存関係などがあれば書いてください。
