name: 不具合
description: 表示崩れ、動作不良、ビルド失敗など
title: "[不具合] "
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何が起きているかを1-3行で書いてください。
      placeholder: |
        例: 料金ページのカードがモバイル幅で重なって表示される。
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: 現在の挙動
      description: 実際に起きていることを書いてください。
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待する挙動
      description: 本来どう動くべきかを書いてください。
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: 分かる範囲で、再現できる操作や条件を書いてください。
      placeholder: |
        1. 対象ページを開く
        2. 問題の操作を行う
        3. 実際の結果を確認する

  - type: textarea
    id: done
    attributes:
      label: 完了条件
      description: 直ったと判断できる状態を書いてください。
      placeholder: |
        - [ ] 問題を再現した操作で正常に動く
        - [ ] 関連する検証が通る
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 関連情報
      description: URL、スクリーンショット、ログ、関連ファイルなどがあれば書いてください。
      placeholder: |
        - URL:
        - 関連ファイル:
