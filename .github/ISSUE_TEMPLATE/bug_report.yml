name: バグ報告
description: 再現可能な不具合やリグレッションを報告します。
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何が問題ですか？
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待される動作
      description: 本来どうなるべきですか？
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
      description: 実際にはどうなりますか？
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: 最小限で確実に再現できる手順を書いてください。
      placeholder: |
        1. ...を開く
        2. ...をクリックする
        3. ...になる
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: 影響するURLまたはパス
      placeholder: https://acecore.net/... or docs/...
  - type: textarea
    id: environment
    attributes:
      label: 環境
      description: ブラウザ、OS、端末、ロケール、パッケージバージョン、デプロイ環境など。
  - type: textarea
    id: notes
    attributes:
      label: 補足
      description: スクリーンショット、ログ、関連リンクなど。
