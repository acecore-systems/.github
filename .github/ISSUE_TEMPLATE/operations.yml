name: 運用・デプロイ
description: デプロイ、DNS、認証、GitHub Actions、外部サービス、公開後確認などの運用作業
title: '[Ops] '
body:
  - type: markdown
    attributes:
      value: |
        外部サービスや権限が関わる作業は、実施対象、必要権限、確認方法、ロールバックを明確にしてください。

  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何を実施したいかを 1-3 行で書いてください。
      placeholder: |
        例: 本番ドメインの DNS record を新しい公開先へ切り替える。
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 背景・目的
      description: なぜ必要か、誰に影響するかを書いてください。
      placeholder: |
        例: デプロイは完了しているが、DNS 設定が未完了で公開 URL が利用できない。
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 完了条件
      description: レビュー時に完了判断できるチェックリストを書いてください。
      placeholder: |
        - [ ] 対象環境の設定が意図どおり更新されている
        - [ ] 公開 URL または対象ジョブの状態を確認している
        - [ ] 権限不足がある場合は必要 permission と未完了状態を記録している
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 対象範囲・除外範囲
      description: 今回触る範囲と、触らない範囲を分けて書いてください。
      placeholder: |
        対象:
        - 対象環境、外部サービス、設定

        除外:
        - サイト本文やアプリ機能の変更
    validations:
      required: true

  - type: textarea
    id: related
    attributes:
      label: 関連パス・URL
      description: 管理画面 URL、公開 URL、リポジトリ内パス、関連 issue/PR を書いてください。
      placeholder: |
        - 公開 URL:
        - 管理画面:
        - パス:
        - 関連 issue/PR:

  - type: textarea
    id: verification
    attributes:
      label: 確認方法
      description: 実行すべきコマンド、外部サービス確認、HTTP status、ログ確認を書いてください。
      placeholder: |
        - gh run list
        - wrangler pages deployment list
        - 公開 URL の HTTP status 確認
    validations:
      required: true

  - type: textarea
    id: operation-details
    attributes:
      label: 実施内容
      description: 実行する操作、設定変更、確認したい状態を書いてください。
    validations:
      required: true

  - type: textarea
    id: permissions
    attributes:
      label: 必要権限・外部サービス
      description: 必要な権限、secret、token、外部サービス、未確認のアクセス権を書いてください。secret の値は書かないでください。
      placeholder: |
        - 外部サービス:
        - 必要 permission:
        - GitHub secret:

  - type: textarea
    id: rollback
    attributes:
      label: ロールバック・復旧方針
      description: 問題が起きた場合に戻す設定や停止条件を書いてください。
      placeholder: |
        - 変更前の設定:
        - 失敗時の戻し方:

  - type: textarea
    id: notes
    attributes:
      label: 補足
      description: 権限、期限、制約、依存関係などがあれば書いてください。
